<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset — What did we do...</title>
<style>
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:#1B1130; color:#F5F1FA; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    padding:24px; text-align:center;
  }
  .box{max-width:420px;}
  h1{font-size:20px; margin-bottom:12px;}
  p{color:#BCAFD6; font-size:14px; line-height:1.5;}
  .status{margin:20px 0; font-weight:600; color:#FFC857;}
  a{
    display:inline-block; margin-top:10px; background:#FF4F8B; color:#fff; text-decoration:none;
    padding:12px 22px; border-radius:9px; font-weight:700;
  }
</style>
</head>
<body>
  <div class="box">
    <h1>Resetting "What did we do..."</h1>
    <p>This clears only the cached app files for this one app — your logged entries and every other app on this site are untouched.</p>
    <div class="status" id="status">Working...</div>
    <a href="./index.html" id="continueLink" style="display:none;">Open the app</a>
  </div>

<script>
(async function(){
  const statusEl = document.getElementById('status');
  try {
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const reg of regs) {
        // Only unregister service workers whose script belongs to this app's folder
        if (reg.active && reg.active.scriptURL.includes('/sw.js') && reg.scope.includes(location.pathname.replace(/[^/]*$/, ''))) {
          await reg.unregister();
        }
      }
    }
    if ('caches' in window) {
      const keys = await caches.keys();
      for (const key of keys) {
        if (key.indexOf('what-did-we-do') === 0) {
          await caches.delete(key);
        }
      }
    }
    statusEl.textContent = 'Done. Tap below to open the app fresh.';
  } catch (err) {
    statusEl.textContent = 'Something went wrong, but it\'s safe to continue.';
  }
  document.getElementById('continueLink').style.display = 'inline-block';
})();
</script>
</body>
</html>
